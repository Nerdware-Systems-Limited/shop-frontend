<!doctype html>
<html lang="en-KE" prefix="og: https://ogp.me/ns# product: https://ogp.me/ns/product#">
  <head>
    <!-- ==================== CRITICAL PERFORMANCE ==================== -->
    <!--
      WHY THIS FILE IS LEAN:
      All page-specific meta tags (title, description, og:*, twitter:*, JSON-LD
      breadcrumbs, product schemas, FAQ schemas) are injected by react-helmet-async
      at runtime AND pre-rendered into each page's static HTML by vite-ssg at
      build time.

      Keeping page-specific meta here DUPLICATES what helmet injects, which causes:
        • Google Search Console "duplicate meta" warnings
        • Social bots reading the wrong (static) OG tags instead of per-page ones
        • JSON-LD entities appearing twice in the document graph

      ONLY keep in index.html:
        1. Charset / viewport / compat (must be first, before any content)
        2. DNS prefetch / preconnect / resource hints (performance, not SEO)
        3. Favicons & web app manifest (static, never change per page)
        4. Global/site-wide JSON-LD (Organization, LocalBusiness, WebSite)
           that is the SAME on every page and should not be duplicated per page
        5. Analytics & tag manager scripts
        6. Security / mobile hints that are truly global
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ==================== RESOURCE HINTS ========================= -->
    <link rel="dns-prefetch"  href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch"  href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch"  href="https://cdnjs.cloudflare.com" />
    <link rel="dns-prefetch"  href="https://kiarie-bucket.s3.amazonaws.com" />
    <link rel="dns-prefetch"  href="https://shop.nerdwaretechnologies.com" />
    <link rel="preconnect"    href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect"    href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect"    href="https://kiarie-bucket.s3.amazonaws.com" />
    <link rel="preconnect"    href="https://shop.nerdwaretechnologies.com" crossorigin />

    <!-- Preload critical font (non-render-blocking) -->
    <link rel="preload" as="style"
          href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
          media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" />
    </noscript>

    <!-- ==================== STATIC / GLOBAL META =================== -->
    <!--
      author is global — it never changes per page.
      Everything else (title, description, og:*, canonical) is handled by Helmet.
    -->
    <meta name="author" content="Sound Wave Audio" />

    <!-- ==================== WEBMASTER VERIFICATION ================= -->
    <meta name="google-site-verification" content="dsAO8AGRcPATu-8LaOdSMLbEHHJUVM-nGNnIdT-2inI" />
    <meta name="msvalidate.01"            content="F9EBAC30A3D147993E71412E6A8C9661" />

    <!-- ==================== BUSINESS / LOCAL SEO =================== -->

    <meta name="geo.placename" content="Nairobi" />
    <meta name="geo.position" content="-1.2921;36.8219" />
    <meta name="ICBM"         content="-1.2921, 36.8219" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- ==================== GLOBAL JSON-LD ======================== -->

      are therefore NOT here.
    -->
    <script type="application/ld+json">

          "priceRange": "KES 5,000 - KES 500,000",
          "telephone": "+254724013583",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Park Road Business Center, Ring Road, Ngara",
            "addressLocality": "Nairobi",
            "addressRegion": "Nairobi County",
            "postalCode": "00100",

          },
          "geo": {

          },
